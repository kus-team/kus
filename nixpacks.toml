# Railway / Nixpacks build config
[phases.setup]
nixPkgs = ["python313", "gcc"]

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  ". /opt/venv/bin/activate && pip install --upgrade pip",
  ". /opt/venv/bin/activate && pip install -r backend/requirements.txt"
]

[phases.build]
cmds = [
  ". /opt/venv/bin/activate && python -c 'from backend.db.connection import apply_schema; apply_schema()' || true"
]

[start]
cmd = ". /opt/venv/bin/activate && uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT"
