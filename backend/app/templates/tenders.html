{% extends "base.html" %}
{% set active_page = "tenders" %}
{% block title %}Тендеры{% endblock %}

{% block content %}
<div class="page">
    <div class="page-header">
        <div>
            <h1><i class="fas fa-table"></i> Тендеры</h1>
            <p class="subtitle">Все закупки с риск-скором. Карточки кликабельны — переход к полной проверке.</p>
        </div>
        <div class="view-toggle">
            <button class="vt-btn active" data-view="cards" onclick="setView('cards')"><i class="fas fa-th"></i></button>
            <button class="vt-btn" data-view="rows" onclick="setView('rows')"><i class="fas fa-list"></i></button>
        </div>
    </div>

    <div class="filter-bar">
        <div class="fb-search">
            <i class="fas fa-search"></i>
            <input type="text" id="fQ" placeholder="Поиск по названию или № лота…">
        </div>
        <div class="fb-pills">
            <button class="pill active" data-risk="0">Все</button>
            <button class="pill" data-risk="30">Жёлтые+</button>
            <button class="pill" data-risk="70">🔥 Красные</button>
        </div>
        <select id="fOrder" class="fb-sel">
            <option value="risk_desc">Риск ↓</option>
            <option value="amount_desc">Сумма ↓</option>
            <option value="date_desc">Дата ↓</option>
            <option value="date_asc">Дата ↑</option>
        </select>
        <button class="btn btn-primary" onclick="load(0)"><i class="fas fa-bolt"></i> Применить</button>
        <a class="btn btn-secondary" id="exportBtn" href="/api/export/tenders.csv?min_risk=0" download data-tooltip="Скачать CSV с текущим фильтром"><i class="fas fa-file-csv"></i> CSV</a>
    </div>

    <div id="results" class="results"></div>

    <div class="pagination">
        <button class="btn btn-secondary btn-sm" onclick="prev()"><i class="fas fa-chevron-left"></i> Назад</button>
        <span id="pageInfo" class="page-info">—</span>
        <button class="btn btn-secondary btn-sm" onclick="next()">Вперёд <i class="fas fa-chevron-right"></i></button>
    </div>
</div>

<style>
.page { max-width: 1400px; margin: 0 auto; padding: 32px 24px; }
.page-header { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom: 24px; gap: 16px; flex-wrap: wrap; }
.page-header h1 { font-family: var(--font-mono); font-size: 24px; display:flex; align-items:center; gap:12px; }
.page-header h1 i { color: var(--accent-red-dim); }
.page-header .subtitle { color: var(--text-secondary); font-size: 13px; margin-top: 4px; }

.view-toggle { display:flex; background: var(--bg-surface); border:1px solid var(--border); border-radius: var(--radius); padding: 3px; }
.vt-btn { background: transparent; border: none; color: var(--text-dim); padding: 8px 12px; border-radius: 4px; cursor: pointer; transition: all .15s; }
.vt-btn.active { background: var(--accent-red); color: white; }
.vt-btn:not(.active):hover { color: var(--text-primary); background: var(--bg-elevated); }

/* ===== Filter bar ===== */
.filter-bar { display:flex; gap:10px; flex-wrap: wrap; align-items:center; margin-bottom: 20px; padding: 14px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); }
.fb-search { flex:1; min-width: 240px; display:flex; align-items:center; gap:8px; padding: 0 14px; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius); transition: border-color .2s; }
.fb-search:focus-within { border-color: var(--accent-red); }
.fb-search i { color: var(--text-dim); font-size: 12px; }
.fb-search input { flex:1; background: transparent; border: none; color: var(--text-primary); padding: 12px 0; font-family: var(--font-mono); font-size: 13px; outline: none; }
.fb-pills { display: flex; gap: 4px; background: var(--bg-input); padding: 3px; border-radius: var(--radius); }
.pill { background: transparent; border: none; color: var(--text-dim); padding: 8px 14px; font-size: 12px; font-family: var(--font-mono); border-radius: 4px; cursor: pointer; transition: all .15s; text-transform: uppercase; letter-spacing: 0.8px; }
.pill.active { background: var(--accent-red); color: white; }
.pill:not(.active):hover { color: var(--text-primary); }
.fb-sel { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-primary); padding: 10px 14px; border-radius: var(--radius); font-family: var(--font-mono); font-size: 12px; }

/* ===== Results — cards ===== */
.results.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 14px; }
.t-card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px; cursor: pointer; transition: all .25s; position: relative; overflow: hidden; opacity: 0; transform: translateY(8px); animation: fadeIn .35s forwards; }
@keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
.t-card:hover { transform: translateY(-3px); border-color: var(--border-light); }
.t-card.r-red { border-left: 3px solid #e74c3c; }
.t-card.r-amber { border-left: 3px solid var(--accent-amber); }
.t-card.r-green { border-left: 3px solid var(--success); }
.t-card.r-red:hover { box-shadow: 0 12px 30px rgba(231,76,60,0.18); border-color: rgba(231,76,60,0.4); }
.t-head { display:flex; justify-content:space-between; align-items:flex-start; gap: 10px; margin-bottom: 10px; }
.t-score { font-family: var(--font-mono); font-size: 24px; font-weight: 700; padding: 4px 12px; border-radius: 8px; flex-shrink: 0; }
.t-score.r-red { background: rgba(231,76,60,0.18); color: #ff6f61; }
.t-score.r-amber { background: rgba(230,126,34,0.18); color: var(--accent-amber); }
.t-score.r-green { background: rgba(39,174,96,0.18); color: var(--success); }
.t-title { font-size: 13px; line-height: 1.5; color: var(--text-primary); flex: 1; min-width: 0; }
.t-flags { display: flex; gap: 4px; flex-wrap: wrap; margin: 8px 0; }
.t-flag { font-family: var(--font-mono); font-size: 9px; padding: 2px 6px; border-radius: 3px; background: rgba(231,76,60,0.15); color: #ff6f61; letter-spacing: 0.8px; }
.t-meta { display:grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); font-family: var(--font-mono); font-size: 11px; }
.t-meta .k { color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
.t-meta .v { color: var(--text-primary); margin-top: 2px; word-break: break-all; }
.t-meta .v.usd { color: var(--accent-cyan); }

/* ===== Results — rows table ===== */
.results.rows table { width: 100%; border-collapse: collapse; background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
.results.rows th { text-align: left; color: var(--text-dim); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; padding: 14px; border-bottom: 1px solid var(--border); background: var(--bg-elevated); font-family: var(--font-mono); }
.results.rows td { padding: 14px; border-bottom: 1px solid var(--border); font-size: 13px; }
.results.rows tr:hover td { background: var(--bg-surface-hover); cursor: pointer; }
.results.rows tr:last-child td { border-bottom: none; }
.results.rows .num { text-align: right; font-family: var(--font-mono); }
.results.rows code { font-family: var(--font-mono); color: var(--text-secondary); font-size: 12px; }

.skel { color: var(--text-dim); font-size: 13px; padding: 60px; text-align: center; grid-column: 1 / -1; background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); }

.pagination { display: flex; justify-content: center; align-items: center; gap: 16px; margin-top: 24px; }
.page-info { color: var(--text-secondary); font-family: var(--font-mono); font-size: 13px; }
</style>
{% endblock %}

{% block scripts %}
<script>
const PAGE = 30;
let offset = 0, total = 0, view = 'cards', minRisk = 0;

document.querySelectorAll('.pill').forEach(b => {
    b.addEventListener('click', () => {
        document.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        minRisk = +b.dataset.risk;
        load(0);
    });
});

function setView(v) {
    view = v;
    document.querySelectorAll('.vt-btn').forEach(x => x.classList.toggle('active', x.dataset.view === v));
    if (lastData) renderCurrent(lastData);
}

let lastData = null;
async function load(off) {
    offset = off ?? offset;
    const q = document.getElementById('fQ').value.trim();
    const order = document.getElementById('fOrder').value;
    const params = new URLSearchParams({ limit: PAGE, offset, order, min_risk: minRisk });
    if (q) params.set('q', q);
    document.getElementById('results').innerHTML = '<div class="skel"><i class="fas fa-spinner fa-spin"></i> Загрузка…</div>';
    try {
        const r = await api('/api/tenders?' + params);
        total = r.total;
        document.getElementById('pageInfo').textContent = `${offset + 1}–${Math.min(offset + PAGE, total)} из ${total.toLocaleString('ru-RU')}`;
        lastData = r.data || [];
        renderCurrent(lastData);
    } catch (e) {
        document.getElementById('results').innerHTML = `<div class="skel" style="color:#ff6f61">Ошибка: ${e.message}</div>`;
    }
}

function flagPills(flags) {
    return [
        flags.monopoly   ? '<span class="t-flag" title="Своя компания">МОНОПОЛИЯ</span>' : '',
        flags.no_compete ? '<span class="t-flag" title="Прямая закупка">БЕЗ КОНКУРСА</span>' : '',
        flags.overpriced ? '<span class="t-flag" title="Цена выше средней">ПЕРЕПЛАТА</span>' : '',
    ].filter(Boolean).join('');
}

function riskCls(s) { return s >= 70 ? 'r-red' : s >= 30 ? 'r-amber' : 'r-green'; }

function renderCurrent(data) {
    const root = document.getElementById('results');
    if (!data.length) { root.innerHTML = '<div class="skel">Ничего не найдено</div>'; return; }
    root.className = 'results ' + view;

    if (view === 'cards') {
        root.innerHTML = data.map((t, i) => {
            const flags = t.risk_flags || {};
            const cls = riskCls(t.risk_score || 0);
            return `
            <div class="t-card ${cls}" style="animation-delay:${i * 25}ms" onclick="window.location.href='/tenders/${t.id}'">
                <div class="t-head">
                    <div class="t-title" title="${t.title || ''}">${(t.title || '—').slice(0, 110)}${(t.title || '').length > 110 ? '…' : ''}</div>
                    <div style="display:flex;align-items:center;gap:6px">
                        ${bookmarkButton(t.id, t.title, t.risk_score)}
                        <div class="t-score ${cls}">${t.risk_score ?? 0}</div>
                    </div>
                </div>
                <div class="t-flags">${flagPills(flags)}</div>
                <div class="t-meta">
                    <div><div class="k">Сумма</div><div class="v">${fmtUzs(t.amount_uzs)}</div><div class="v usd">${fmtUsd(t.amount_usd)}</div></div>
                    <div><div class="k">Дата · Лот</div><div class="v">${t.date || '—'}</div><div class="v" style="color:var(--text-dim)">№ ${t.lot_id || '—'}</div></div>
                    <div style="grid-column: 1 / -1"><div class="k">Категория</div><div class="v" style="font-size:11px;color:var(--text-secondary)">${(t.category || '—').slice(0, 60)}${(t.category || '').length > 60 ? '…' : ''}</div></div>
                </div>
            </div>`;
        }).join('');
    } else {
        root.innerHTML = `
        <table>
            <thead><tr>
                <th>Risk</th><th>Дата</th><th>Победитель</th><th>Название</th><th class="num">UZS</th><th class="num">USD</th>
            </tr></thead>
            <tbody>${data.map(t => `
                <tr onclick="window.location.href='/tenders/${t.id}'">
                    <td><span class="t-score ${riskCls(t.risk_score)}" style="font-size:14px;padding:3px 10px">${t.risk_score ?? 0}</span><br>${flagPills(t.risk_flags || {})}</td>
                    <td>${t.date || '—'}</td>
                    <td><code>${t.winner_tin || '—'}</code><br><span style="color:var(--text-dim);font-size:11px">${t.winner_name || ''}</span></td>
                    <td title="${t.title || ''}">${(t.title || '—').slice(0, 80)}${(t.title || '').length > 80 ? '…' : ''}</td>
                    <td class="num">${fmtUzs(t.amount_uzs)}</td>
                    <td class="num" style="color:var(--accent-cyan)">${fmtUsd(t.amount_usd)}</td>
                </tr>`).join('')}
            </tbody>
        </table>`;
    }
}

function next() { if (offset + PAGE < total) load(offset + PAGE); }
function prev() { if (offset >= PAGE) load(offset - PAGE); }
document.getElementById('fQ').addEventListener('keydown', e => { if (e.key === 'Enter') load(0); });

// Update CSV export link with current filter
function syncExportLink() {
    document.getElementById('exportBtn').href = `/api/export/tenders.csv?min_risk=${minRisk}&limit=5000`;
}
document.querySelectorAll('.pill').forEach(b => b.addEventListener('click', syncExportLink));
syncExportLink();

load(0);
</script>
{% endblock %}
